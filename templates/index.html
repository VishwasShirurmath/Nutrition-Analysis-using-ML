<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nutri-Score Scanner</title>
    
    <!-- PWA Setup -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <link rel="apple-touch-icon" href="/static/icons/icon-192.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <div class="logo">🥗 NutriScan</div>
            <p class="subtitle">Scan a barcode to predict Nutri-Score</p>
        </header>

        <main>
            <!-- Scanner Section -->
            <section class="card glass-card">
                <h2>Barcode Scanner</h2>
                <div id="reader" class="scanner-container"></div>
                
                <div class="manual-entry">
                    <p class="divider"><span>OR</span></p>
                    <div class="input-group">
                        <input type="text" id="barcode-input" placeholder="Enter barcode manually" />
                        <button id="search-btn" class="btn primary">Search</button>
                    </div>
                </div>
            </section>

            <!-- Loading Indicator -->
            <div id="loading" class="loading-overlay hidden">
                <div class="spinner"></div>
                <p>Processing data...</p>
            </div>

            <!-- Error Message -->
            <div id="error-message" class="alert hidden">
                <span class="icon">⚠️</span>
                <span id="error-text">Product not found. Ensure barcode is correct.</span>
            </div>

            <!-- Product Info & Prediction Form -->
            <section id="data-section" class="card glass-card hidden">
                <div class="product-header">
                    <img id="product-img" src="" alt="ProductImage" class="hidden"/>
                    <h3 id="product-name">Product Name</h3>
                </div>

                <form id="nutriments-form">
                    <h4>Nutritional Values (per 100g/ml)</h4>
                    <div id="form-grid" class="form-grid">
                        <!-- Inputs generated by JS -->
                    </div>
                </form>

                <div class="action-row">
                    <button id="predict-btn" class="btn success full-width">Predict Nutri-Score</button>
                </div>
            </section>

            <!-- Result Section -->
            <section id="result-section" class="card result-card hidden">
                <h2>Prediction Result</h2>
                <div class="result-display">
                    <div class="emoji-circle" id="result-emoji">⚪</div>
                    <div class="grade" id="result-grade">A</div>
                    <p class="label" id="result-label">Excellent nutritional quality</p>
                </div>
                <button id="reset-btn" class="btn outline mt-4">Scan Another</button>
            </section>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8" type="text/javascript"></script>
    <script src="/static/script.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js').then(reg => {
                    console.log('Service Worker registered');
                }).catch(err => {
                    console.error('Service Worker registration failed:', err);
                });
            });
        }
    </script>
</body>
</html>
